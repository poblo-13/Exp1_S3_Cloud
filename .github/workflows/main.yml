name: CI-CD Microservices

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # AJUSTE 1: Cambiado a JDK 17 (según tu pom.xml)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build y Push Course Service
      - name: Build and Push Course Service
        uses: docker/build-push-action@v6
        with:
          context: ./courseservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/courseservice:latest

      # Build y Push Enrollment Service
      - name: Build and Push Enrollment Service
        uses: docker/build-push-action@v6
        with:
          context: ./enrollmentservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/enrollmentservice:latest

      # Configurar llave SSH
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Deploy automático en EC2
      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << EOF

            # Login DockerHub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # =========================
            # COURSE SERVICE
            # =========================

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/courseservice:latest

            docker stop courseservice || true
            docker rm courseservice || true

            docker run -d \
              --name courseservice \
              -p 8082:8082 \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/courseservice:latest

            # =========================
            # ENROLLMENT SERVICE
            # =========================

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/enrollmentservice:latest

            docker stop enrollmentservice || true
            docker rm enrollmentservice || true

            # AJUSTE 2: Agregado el volumen -v /mnt/efs:/mnt/efs
            docker run -d \
              --name enrollmentservice \
              -p 8083:8083 \
              -v /mnt/efs:/mnt/efs \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/enrollmentservice:latest

            # Mostrar contenedores activos
            docker ps

          EOF